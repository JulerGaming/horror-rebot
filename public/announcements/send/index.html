<!doctype html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            /* respect iPhone notch / safe area */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #333;
            color: #fff;
            text-align: center;
        }

        h1 {
            margin: 0 16px 8px;
            font-size: 1.8rem;
            line-height: 1.1;
        }

        span {
            display: block;
            margin: 0 16px;
            font-size: 1rem;
        }

        strong.running {
            color: #0f0;
            font-weight: 700;
        }

        /* Small phones (iPhone SE, etc.) */
        @media (max-width: 420px) {
            h1 {
                font-size: 1.4rem;
            }

            span {
                font-size: 0.95rem;
            }

            body {
                padding-left: 12px;
                padding-right: 12px;
            }
        }

        /* Larger phones / small tablets */
        @media (min-width: 421px) and (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            span {
                font-size: 1.1rem;
            }
        }

        .top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #222;
            padding: 8px 16px;
            box-sizing: border-box;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            border-bottom: 1px solid #444;
            /* left to right order */
            display: flex;
            align-items: center;
        }

        .top img {
            height: 24px;
            margin-right: 8px;
        }

        .top span {
            margin-left: 1px;
            font-size: 1rem;
        }

        .body {
            margin-top: 48px;
            margin-bottom: 16px;
        }

        .log {
            width: 90%;
            height: 300px;
            border: none;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .top button {
            all: unset;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .top .redirect-buttons {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }

        body button {
            padding: 8px 16px;
            font-size: 1rem;
            border-radius: 4px;
            border: none;
            background-color: #0f0;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }

        body label {
            margin-left: 8px;
            font-size: 1rem;
        }

        .list {
            list-style: none;
            padding: 0;
            margin: 16px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .list input[type="text"] {
            width: 80%;
            padding: 8px;
            font-size: 1rem;
            border-radius: 4px;
            border: none;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .list input[type="checkbox"] {
            transform: scale(1.2);
            margin-top: 12px;
            margin-bottom: 21px;
        }

        .list button {
            margin-top: 16px;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 4px;
            border: none;
            background-color: #0f0;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
    </style>
    <script>
        function goHome() {
            window.location.href = "/";
        }

        function sendAnnouncement() {
            const title = document.getElementById("announcement-title").value.trim();
            const content = document.getElementById("announcement-content").value.trim();

            if (!title || !content) {
                alert("Please fill in both the title and content fields.");
                return;
            }

            fetch("/send-announcement", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    title: title,
                    content: content,
                    pingEveryone: document.getElementById("ping-everyone").checked
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert("Announcement sent successfully!");
                        document.getElementById("announcement-title").value = "";
                        document.getElementById("announcement-content").value = "";
                    } else {
                        alert("Failed to send announcement: " + data.error);
                    }
                })
                .catch(error => {
                    console.error("Error sending announcement:", error);
                    alert("An error occurred while sending the announcement.");
                });
        }
    </script>
    <meta charset="utf-8" />
    <title>Horror Rebot</title>
    <link rel="icon"
        href="https://cdn.discordapp.com/avatars/1369007178664378429/7069810073b2a5b9d9553b0ccb34d993.webp?size=128"
        sizes="128x128" type="image/webp">
    <link rel="apple-touch-icon"
        href="https://cdn.discordapp.com/avatars/1369007178664378429/7069810073b2a5b9d9553b0ccb34d993.webp?size=256">
    <link rel="shortcut icon"
        href="https://cdn.discordapp.com/avatars/1369007178664378429/7069810073b2a5b9d9553b0ccb34d993.webp">
    <meta name="theme-color" content="#222">
</head>

<body>
    <div class="top">
        <img src="https://cdn.discordapp.com/avatars/1369007178664378429/7069810073b2a5b9d9553b0ccb34d993.webp?size=128"
            alt="Horror Rebot Logo">
        <span>Horror Rebot - Send Announcement</span>
        <div class="redirect-buttons">
            <button onclick="window.location.href='/'">Home</button>
            <button onclick="window.location.href='/announcements/send/'">Send Announcement</button>
            <button onclick="window.location.href='/tools/'">Tools</button>
        </div>
    </div>
    <div class="body">
        <h1>Send Announcement</h1>
        <div class="list">
            <label>
                <input type="checkbox" id="ping-everyone" />
                Ping Everyone
            </label>
            <input type="text" id="announcement-title" placeholder="Title..."
                style="width: 80%; padding: 8px; font-size: 1rem; border-radius: 4px; border: none; box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);">
            <input type="text" id="announcement-content" placeholder="Content..."
                style="width: 80%; padding: 8px; font-size: 1rem; border-radius: 4px; border: none; box-shadow: 0 0 5px rgba(255, 255, 255, 0.5); margin-top: 12px;">
            <button onclick="sendAnnouncement()"
                style="margin-top: 16px; padding: 10px 20px; font-size: 1rem; border-radius: 4px; border: none; background-color: #0f0; color: #000; font-weight: 700; cursor: pointer; box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);">Send
                Announcement</button>
        </div>
    </div>

</html>
