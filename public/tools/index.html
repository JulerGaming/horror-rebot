<!doctype html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            /* respect iPhone notch / safe area */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #333;
            color: #fff;
            text-align: center;
        }

        h1 {
            margin: 0 16px 8px;
            font-size: 1.8rem;
            line-height: 1.1;
        }

        span {
            display: block;
            margin: 0 16px;
            font-size: 1rem;
        }

        strong.running {
            color: #0f0;
            font-weight: 700;
        }

        /* Small phones (iPhone SE, etc.) */
        @media (max-width: 420px) {
            h1 {
                font-size: 1.4rem;
            }

            span {
                font-size: 0.95rem;
            }

            body {
                padding-left: 12px;
                padding-right: 12px;
            }
        }

        /* Larger phones / small tablets */
        @media (min-width: 421px) and (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            span {
                font-size: 1.1rem;
            }
        }

        .top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #222;
            padding: 8px 16px;
            box-sizing: border-box;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            border-bottom: 1px solid #444;
            /* left to right order */
            display: flex;
            align-items: center;
        }

        .top img {
            height: 24px;
            margin-right: 8px;
        }

        .top span {
            margin-left: 1px;
            font-size: 1rem;
        }

        .body {
            margin-top: 48px;
            margin-bottom: 16px;
        }

        .log {
            width: 90%;
            height: 300px;
            border: none;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .top button {
            all: unset;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .top .redirect-buttons {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }


        button {
            margin-top: 16px;
            padding: 8px 16px;
            background-color: #444;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        .list button {
            width: 100%;
        }

        .list {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 200px;
            margin-left: auto;
            margin-right: auto;
        }

        .list label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .list input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }
    </style>
    <script>
        function goHome() {
            window.location.href = "/";
        }

        function rs() {
            if (!confirm('Are you sure you want to restart the bot? THIS WILL BREAK THE WEB INTERFACE!!')) {
                return;
            }
            fetch('/tools/restart', {
                method: 'POST'
            }).then(response => {
                if (response.ok) {
                    alert('Restarting bot... This server is unavailable until the bot starts.');
                } else {
                    alert('Failed to send restart command.');
                }
            }).catch(error => {
                alert('Error: ' + error);
            });
        }

        function toggleChatGPT() {
            const enabled = document.getElementById('chatgpt-toggle').checked;
            fetch('/tools/chatgpt', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ enabled })
            }).then(response => {
                if (response.ok) {
                    alert('ChatGPT integration ' + (enabled ? 'enabled' : 'disabled') + '.');
                } else {
                    alert('Failed to update ChatGPT integration.');
                }
            }).catch(error => {
                alert('Error: ' + error);
            });
        }

        function ToggleVCRelatedStuff() {
            const enabled = document.getElementById('vc-toggle').checked;
            fetch('tools/vc', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ enabled })
            }).then(response => {
                if (response.ok) {
                    alert('success')
                } else {
                    alert('error')
                }
            }).catch(error => {
                alert('error: ' + error);
            });
        }

        // Fetch the current ChatGPT integration status on page load
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/chatgpt-status')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('chatgpt-toggle').checked = data.enabled;
                })
                .catch(error => {
                    console.error('Error fetching ChatGPT status:', error);
                });
            fetch('/vc-status')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('vc-toggle').checked = data.enabled;
                })
                .catch(error => {
                    console.error('Error fetching VC status:', error);
                })
        });
    </script>
    <meta charset="utf-8" />
    <title>Horror Rebot</title>
    <link rel="icon"
        href="https://cdn.discordapp.com/avatars/1369007178664378429/7069810073b2a5b9d9553b0ccb34d993.webp?size=128"
        sizes="128x128" type="image/webp">
    <link rel="apple-touch-icon"
        href="https://cdn.discordapp.com/avatars/1369007178664378429/7069810073b2a5b9d9553b0ccb34d993.webp?size=256">
    <link rel="shortcut icon"
        href="https://cdn.discordapp.com/avatars/1369007178664378429/7069810073b2a5b9d9553b0ccb34d993.webp">
    <meta name="theme-color" content="#222">
</head>

<body>
    <div class="top">
        <img src="https://cdn.discordapp.com/avatars/1369007178664378429/7069810073b2a5b9d9553b0ccb34d993.webp?size=128"
            alt="Horror Rebot Logo">
        <span>Horror Rebot - Tools</span>
        <div class="redirect-buttons">
            <button onclick="window.location.href='/'">Home</button>
            <button onclick="window.location.href='/announcements/send/'">Send Announcement</button>
            <button onclick="window.location.href='/tools/'">Tools</button>
        </div>
    </div>
    <div class="body">
        <h1>Tools</h1>
        <span>Allows you to configure the bot.</span>
        <div class="list">
            <button onclick="rs()">Restart</button>
            <label>
                <input type="checkbox" id="chatgpt-toggle" onchange="toggleChatGPT()" />
                Enable ChatGPT Integration
            </label>
            <label>
                <input type="checkbox" id="vc-toggle" onchange="ToggleVCRelatedStuff" />
                Enable Voice Related Stuff
            </label>
        </div>
    </div>

</html>
