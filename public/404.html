<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            /* respect iPhone notch / safe area */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #111;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.78), rgba(0, 0, 0, 0.78)),
                url("./bg.png");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            color: #fff;
            text-align: center;
        }

        h1 {
            margin: 0 16px 8px;
            font-size: 1.8rem;
            line-height: 1.1;
        }

        span {
            display: block;
            margin: 0 16px;
            font-size: 1rem;
        }

        strong.running {
            color: #0f0;
            font-weight: 700;
        }

        /* Small phones (iPhone SE, etc.) */
        @media (max-width: 420px) {
            h1 {
                font-size: 1.4rem;
            }

            span {
                font-size: 0.95rem;
            }

            body {
                padding-left: 12px;
                padding-right: 12px;
            }
        }

        /* Larger phones / small tablets */
        @media (min-width: 421px) and (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            span {
                font-size: 1.1rem;
            }
        }

        .top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #222;
            padding: 8px 16px;
            box-sizing: border-box;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            border-bottom: 1px solid #444;
            /* left to right order */
            display: flex;
            align-items: center;
        }

        .top img {
            height: 24px;
            margin-right: 8px;
        }

        .top span {
            margin-left: 1px;
            font-size: 1rem;
        }

        .body {
            margin-top: 48px;
            margin-bottom: 16px;
        }

        .log {
            width: 90%;
            height: 300px;
            border: none;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
    </style>
    <meta charset="utf-8" />
    <title>404 Page Not Found</title>
    <link rel="icon"
        href="https://cdn.discordapp.com/avatars/1369007178664378429/7069810073b2a5b9d9553b0ccb34d993.webp?size=128"
        sizes="128x128" type="image/webp">
    <link rel="apple-touch-icon"
        href="https://cdn.discordapp.com/avatars/1369007178664378429/7069810073b2a5b9d9553b0ccb34d993.webp?size=256">
    <link rel="shortcut icon"
        href="https://cdn.discordapp.com/avatars/1369007178664378429/7069810073b2a5b9d9553b0ccb34d993.webp">
    <meta name="theme-color" content="#222">
</head>

<body>
    <div class="top">
        <img src="https://cdn.discordapp.com/avatars/1369007178664378429/7069810073b2a5b9d9553b0ccb34d993.webp?size=128"
            alt="Horror Rebot Logo" style="height: 24px; vertical-align: middle; margin-right: 8px;" />
        <span>Horror Rebot</span>
    </div>
    <h1>404 - Page Not Found</h1>
    <p>Sorry, the page you are looking for does not exist.</p>
</body>

</html>
